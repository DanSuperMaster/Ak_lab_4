source: |
  (DEFUN PRINT-NUM (PNN)
    (IF (= PNN 0)
        (WRITE 48)
        (PROGN
          (SETQ PND (* 1000000 1000))
          (SETQ PNS 0)
          (WHILE (> PND 0)
            (PROGN
              (SETQ PNG (/ PNN PND))
              (IF (> (+ PNG PNS) 0)
                  (PROGN
                    (SETQ PNS 1)
                    (WRITE (+ PNG 48))
                    (SETQ PNN (- PNN (* PNG PND))))
                  (PROGN))
              (SETQ PND (/ PND 10)))))))

  (SETQ N 100)
  (SETQ I 1)
  (SETQ SUM 0)
  (SETQ SUMSQ 0)
  (WHILE (< I (+ N 1))
    (PROGN
      (SETQ SUM (+ SUM I))
      (SETQ SUMSQ (+ SUMSQ (* I I)))
      (SETQ I (+ I 1))))

  (PRINT-NUM (- (* SUM SUM) SUMSQ))
  (WRITE 10)

