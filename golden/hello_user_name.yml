  (WRITE 10)

  (PRINT-STR "Hello, ")
  (SETQ C (READ))
  (WHILE (- C 10)
    (PROGN
      (WRITE C)
      (SETQ C (READ))))
  (WRITE 33)
  (WRITE 10)

